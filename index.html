<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>古代生存指南：你最适合打什么工</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: #1a1c2c;
    color: #f4f4f4;
    min-height: 100vh;
    overflow-x: hidden;
    image-rendering: pixelated;
}

.container { max-width: 420px; margin: 0 auto; min-height: 100vh; position: relative; }

.page { display: none; min-height: 100vh; padding: 30px 20px; animation: fadeIn 0.3s ease; }
.page.active { display: flex; flex-direction: column; align-items: center; justify-content: center; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

/* ── 像素风通用 ── */
.pixel-border {
    border: 4px solid #f4f4f4;
    box-shadow:
        inset -4px -4px 0 #5d275d,
        inset 4px 4px 0 #b13e53,
        0 0 0 4px #1a1c2c;
}
.pixel-box {
    background: #262b44;
    border: 3px solid #5d275d;
    box-shadow: 4px 4px 0 #0d0f14;
}
.pixel-text {
    font-family: 'Press Start 2P', monospace;
    font-size: 10px;
    line-height: 2;
}

/* 8-bit 调色板 */
:root {
    --pixel-dark: #1a1c2c;
    --pixel-purple: #5d275d;
    --pixel-red: #b13e53;
    --pixel-orange: #ef7d57;
    --pixel-yellow: #ffcd75;
    --pixel-green: #38b764;
    --pixel-blue: #29366f;
    --pixel-sky: #41a6f6;
    --pixel-white: #f4f4f4;
    --pixel-gray: #73eff7;
    --pixel-dark2: #262b44;
}

/* ── 开屏页 ── */
#page-start {
    background: var(--pixel-dark);
    text-align: center;
}
.start-pixel-art {
    font-size: 48px;
    margin-bottom: 20px;
    animation: bounce 1s ease-in-out infinite;
}
@keyframes bounce { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

.start-title {
    font-family: 'Press Start 2P', monospace;
    font-size: 14px;
    color: var(--pixel-yellow);
    margin-bottom: 8px;
    text-shadow: 3px 3px 0 var(--pixel-purple);
    line-height: 2.2;
}
.start-subtitle {
    font-size: 18px;
    color: var(--pixel-orange);
    margin-bottom: 12px;
    font-weight: bold;
    letter-spacing: 2px;
}
.start-sub {
    font-size: 14px;
    color: var(--pixel-gray);
    line-height: 1.8;
    margin-bottom: 30px;
}
.start-hint {
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    color: var(--pixel-green);
    margin-bottom: 24px;
    animation: blink 1.2s step-end infinite;
}
@keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }

.btn-start {
    background: var(--pixel-green);
    color: var(--pixel-dark);
    border: none;
    padding: 14px 36px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    letter-spacing: 2px;
    box-shadow: 4px 4px 0 #257953;
    transition: all 0.1s;
    border-radius: 0;
}
.btn-start:active { transform: translate(4px, 4px); box-shadow: none; }

/* ── 答题页 ── */
#page-quiz {
    justify-content: flex-start;
    padding-top: 20px;
    position: relative;
    overflow: hidden;
    background: var(--pixel-dark);
}

.scene-bg {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0; z-index: 0;
    opacity: 1; overflow: hidden;
}
.scene-bg.fading { opacity: 0; transition: opacity 0.2s ease; }
.scene-bg.showing { opacity: 1; transition: opacity 0.3s ease; }
.scene-bg .scene-gradient { position: absolute; top: 0; left: 0; right: 0; bottom: 0; }
.scene-bg .scene-elements { position: absolute; top: 0; left: 0; right: 0; bottom: 0; opacity: 0.3; }
.scene-bg .scene-overlay {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    background: linear-gradient(180deg, rgba(26,28,44,0.3) 0%, rgba(26,28,44,0.6) 40%, rgba(26,28,44,0.9) 100%);
}

/* 像素风背景 */
.bg-palace .scene-gradient { background: linear-gradient(180deg, #5d275d 0%, #3a1a3a 50%, #1a1c2c 100%); }
.bg-market .scene-gradient { background: linear-gradient(180deg, #ef7d57 0%, #5d275d 50%, #1a1c2c 100%); }
.bg-study .scene-gradient { background: linear-gradient(180deg, #38b764 0%, #257953 50%, #1a1c2c 100%); }
.bg-wild .scene-gradient { background: linear-gradient(180deg, #29366f 0%, #1a1c2c 50%, #0d0f14 100%); }
.bg-court .scene-gradient { background: linear-gradient(180deg, #b13e53 0%, #5d275d 50%, #1a1c2c 100%); }
.bg-road .scene-gradient { background: linear-gradient(180deg, #73eff7 0%, #29366f 50%, #1a1c2c 100%); }
.bg-feast .scene-gradient { background: linear-gradient(180deg, #ffcd75 0%, #ef7d57 50%, #1a1c2c 100%); }
.bg-border .scene-gradient { background: linear-gradient(180deg, #b13e53 0%, #29366f 50%, #1a1c2c 100%); }
.bg-treasury .scene-gradient { background: linear-gradient(180deg, #ffcd75 0%, #5d275d 50%, #1a1c2c 100%); }
.bg-exam .scene-gradient { background: linear-gradient(180deg, #41a6f6 0%, #29366f 50%, #1a1c2c 100%); }
.bg-battle .scene-gradient { background: linear-gradient(180deg, #b13e53 0%, #1a1c2c 50%, #0d0f14 100%); }
.bg-betray .scene-gradient { background: linear-gradient(180deg, #262b44 0%, #0d0f14 50%, #1a1c2c 100%); }
.bg-duel .scene-gradient { background: linear-gradient(180deg, #5d275d 0%, #b13e53 50%, #1a1c2c 100%); }
.bg-power .scene-gradient { background: linear-gradient(180deg, #ffcd75 0%, #b13e53 50%, #1a1c2c 100%); }
.bg-disciples .scene-gradient { background: linear-gradient(180deg, #38b764 0%, #29366f 50%, #1a1c2c 100%); }
.bg-moonnight .scene-gradient { background: linear-gradient(180deg, #29366f 0%, #1a1c2c 50%, #0d0f14 100%); }
.bg-throne .scene-gradient { background: linear-gradient(180deg, #b13e53 0%, #5d275d 50%, #1a1c2c 100%); }
.bg-village .scene-gradient { background: linear-gradient(180deg, #38b764 0%, #257953 50%, #1a1c2c 100%); }
.bg-horizon .scene-gradient { background: linear-gradient(180deg, #41a6f6 0%, #ef7d57 50%, #1a1c2c 100%); }
.bg-legacy .scene-gradient { background: linear-gradient(180deg, #73eff7 0%, #262b44 50%, #1a1c2c 100%); }

.quiz-content { position: relative; z-index: 1; width: 100%; display: flex; flex-direction: column; align-items: center; }

.quiz-progress { width: 100%; margin-bottom: 16px; }
.progress-bar { width: 100%; height: 8px; background: var(--pixel-dark2); border: 2px solid var(--pixel-purple); }
.progress-fill { height: 100%; background: var(--pixel-green); transition: width 0.3s step-end; }
.progress-text { text-align: right; font-family: 'Press Start 2P', monospace; font-size: 8px; color: var(--pixel-gray); margin-top: 4px; }

.quiz-chapter {
    font-family: 'Press Start 2P', monospace;
    font-size: 8px; color: var(--pixel-yellow); letter-spacing: 1px; margin-bottom: 10px;
}

.quiz-scene {
    font-size: 13px; color: var(--pixel-gray); line-height: 1.6; text-align: center;
    margin-bottom: 12px; max-width: 340px;
}

.quiz-question {
    font-size: 17px; font-weight: bold; line-height: 1.6; text-align: center;
    margin-bottom: 12px; color: var(--pixel-white);
    text-shadow: 2px 2px 0 rgba(0,0,0,0.5);
}

.quiz-illustration {
    width: 100%; height: 120px; position: relative; margin-top: 20px;
    display: flex; align-items: center; justify-content: center;
    background: var(--pixel-dark2);
    border: 3px solid var(--pixel-purple);
    box-shadow: 4px 4px 0 #0d0f14;
    overflow: hidden;
}
.quiz-illustration canvas {
    width: 100%; height: 100%;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
}

.quiz-options { width: 100%; }

.option-btn {
    width: 100%;
    background: var(--pixel-dark2);
    border: 3px solid var(--pixel-purple);
    color: var(--pixel-white);
    padding: 12px 16px;
    margin-bottom: 8px;
    font-size: 14px; line-height: 1.5;
    text-align: left; cursor: pointer;
    transition: all 0.1s;
    display: flex; align-items: flex-start; gap: 10px;
    box-shadow: 3px 3px 0 #0d0f14;
    border-radius: 0;
}
.option-btn:active, .option-btn.selected {
    background: var(--pixel-purple);
    border-color: var(--pixel-yellow);
    transform: translate(3px, 3px);
    box-shadow: none;
}
.option-label {
    flex-shrink: 0; width: 24px; height: 24px;
    background: var(--pixel-red); color: var(--pixel-white);
    font-size: 12px; font-weight: bold; font-family: 'Press Start 2P', monospace;
    display: flex; align-items: center; justify-content: center;
}
.option-btn.selected .option-label { background: var(--pixel-yellow); color: var(--pixel-dark); }

/* ── 加载页 ── */
#page-loading { background: var(--pixel-dark); text-align: center; }
.loading-icon { font-size: 48px; margin-bottom: 20px; animation: loadSpin 0.5s steps(4) infinite; }
@keyframes loadSpin { from { transform: rotate(0); } to { transform: rotate(360deg); } }
.loading-text {
    font-family: 'Press Start 2P', monospace;
    font-size: 10px; color: var(--pixel-yellow); letter-spacing: 1px;
}
.loading-bar { width: 200px; height: 12px; border: 3px solid var(--pixel-purple); margin-top: 16px; background: var(--pixel-dark2); }
.loading-bar-fill { height: 100%; background: var(--pixel-green); animation: loadBar 2.5s steps(10) forwards; }
@keyframes loadBar { from { width: 0; } to { width: 100%; } }

/* ── 结果页 ── */
#page-result { background: var(--pixel-dark); padding: 20px 16px; }

.result-portrait {
    width: 100%; height: 160px; position: relative; overflow: hidden;
    border: 4px solid var(--pixel-yellow);
    box-shadow: 6px 6px 0 #0d0f14;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 0;
}
.result-portrait .portrait-bg { position: absolute; top: 0; left: 0; right: 0; bottom: 0; }
.result-portrait .portrait-figure { position: relative; z-index: 1; font-size: 80px; filter: drop-shadow(4px 4px 0 rgba(0,0,0,0.5)); }
.result-portrait .portrait-particles { position: absolute; top: 0; left: 0; right: 0; bottom: 0; z-index: 0; opacity: 0.5; }

.portrait-chancellor .portrait-bg { background: linear-gradient(135deg, var(--pixel-red) 0%, var(--pixel-yellow) 100%); }
.portrait-teacher .portrait-bg { background: linear-gradient(135deg, var(--pixel-blue) 0%, var(--pixel-sky) 100%); }
.portrait-advisor .portrait-bg { background: linear-gradient(135deg, var(--pixel-purple) 0%, #9b59b6 100%); }
.portrait-merchant .portrait-bg { background: linear-gradient(135deg, var(--pixel-orange) 0%, var(--pixel-yellow) 100%); }
.portrait-chef .portrait-bg { background: linear-gradient(135deg, var(--pixel-red) 0%, var(--pixel-orange) 100%); }
.portrait-bizmaster .portrait-bg { background: linear-gradient(135deg, var(--pixel-green) 0%, var(--pixel-yellow) 100%); }
.portrait-swordsman .portrait-bg { background: linear-gradient(135deg, var(--pixel-sky) 0%, var(--pixel-blue) 100%); }
.portrait-traveler .portrait-bg { background: linear-gradient(135deg, var(--pixel-green) 0%, var(--pixel-sky) 100%); }
.portrait-hermit .portrait-bg { background: linear-gradient(135deg, #f4f4f4 0%, var(--pixel-gray) 100%); }
.portrait-hanlin .portrait-bg { background: linear-gradient(135deg, var(--pixel-sky) 0%, var(--pixel-purple) 100%); }
.portrait-general .portrait-bg { background: linear-gradient(135deg, var(--pixel-red) 0%, #8b0000 100%); }
.portrait-spy .portrait-bg { background: linear-gradient(135deg, #0d0f14 0%, var(--pixel-purple) 100%); }

.result-scroll {
    width: 100%;
    background: var(--pixel-dark2);
    border: 4px solid var(--pixel-purple);
    border-top: none;
    box-shadow: 6px 6px 0 #0d0f14;
    padding: 24px 18px; color: var(--pixel-white);
    text-align: center; position: relative;
}
.result-header {
    font-family: 'Press Start 2P', monospace;
    font-size: 8px; color: var(--pixel-yellow); letter-spacing: 2px; margin-bottom: 6px;
}
.result-decree { font-size: 12px; color: var(--pixel-gray); margin-bottom: 16px; }
.result-icon { font-size: 40px; margin-bottom: 8px; }
.result-title {
    font-size: 24px; font-weight: 900; color: var(--pixel-yellow); margin-bottom: 4px;
    text-shadow: 3px 3px 0 var(--pixel-purple);
    letter-spacing: 4px;
}
.result-subtitle { font-size: 13px; color: var(--pixel-orange); letter-spacing: 2px; margin-bottom: 16px; }
.result-desc { font-size: 13px; color: var(--pixel-gray); line-height: 1.8; text-align: left; margin-bottom: 16px; }
.result-modern {
    background: var(--pixel-blue); border: 2px solid var(--pixel-purple);
    padding: 10px 14px; margin-bottom: 12px;
}
.result-modern-label { font-family: 'Press Start 2P', monospace; font-size: 7px; color: var(--pixel-green); margin-bottom: 4px; }
.result-modern-text { font-size: 14px; font-weight: bold; color: var(--pixel-yellow); }
.result-rare { font-family: 'Press Start 2P', monospace; font-size: 8px; color: var(--pixel-red); }
.result-stamp {
    position: absolute; right: 12px; top: 12px; width: 50px; height: 50px;
    border: 3px solid var(--pixel-red);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; color: var(--pixel-red); font-weight: 900;
    transform: rotate(-10deg);
}

.result-actions { width: 100%; margin-top: 16px; display: flex; gap: 10px; }
.btn-share, .btn-retry {
    flex: 1; padding: 12px 0; font-size: 14px; font-weight: bold;
    cursor: pointer; border: none; transition: all 0.1s;
    box-shadow: 4px 4px 0 #0d0f14; border-radius: 0;
}
.btn-share { background: var(--pixel-green); color: var(--pixel-dark); }
.btn-retry { background: var(--pixel-dark2); border: 3px solid var(--pixel-purple); color: var(--pixel-yellow); }
.btn-share:active, .btn-retry:active { transform: translate(4px, 4px); box-shadow: none; }

.result-partner {
    width: 100%; margin-top: 12px; padding: 12px;
    background: var(--pixel-dark2); border: 3px solid var(--pixel-purple);
    box-shadow: 4px 4px 0 #0d0f14; text-align: center;
}
.result-partner-label { font-family: 'Press Start 2P', monospace; font-size: 7px; color: var(--pixel-gray); margin-bottom: 4px; }
.result-partner-text { font-size: 13px; color: var(--pixel-orange); font-weight: bold; }

/* ── 海报弹窗 ── */
.poster-overlay {
    display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(13,15,20,0.95); z-index: 100;
    align-items: center; justify-content: center; padding: 20px;
}
.poster-overlay.active { display: flex; flex-direction: column; }
.poster-canvas { max-width: 100%; max-height: 70vh; }
.poster-tip { color: var(--pixel-gray); font-size: 12px; margin-top: 12px; text-align: center; }
.btn-close-poster {
    margin-top: 12px; background: var(--pixel-dark2); border: 3px solid var(--pixel-purple);
    color: var(--pixel-yellow); padding: 10px 28px; font-size: 13px; cursor: pointer;
    box-shadow: 3px 3px 0 #0d0f14;
}
.btn-close-poster:active { transform: translate(3px,3px); box-shadow: none; }
</style>
</head>
<body>
<div class="container">

<div class="page active" id="page-start">
    <div class="start-pixel-art">⚔️</div>
    <div class="start-title">ANCIENT<br>CAREER TEST</div>
    <div class="start-subtitle">古代生存指南</div>
    <div class="start-sub">你最适合打什么工</div>
    <div class="start-hint">- PRESS START -</div>
    <button class="btn-start" onclick="startQuiz()">开始穿越</button>
</div>

<div class="page" id="page-quiz">
    <div class="scene-bg" id="sceneBg">
        <div class="scene-gradient"></div>
        <div class="scene-elements"></div>
        <div class="scene-overlay"></div>
    </div>
    <div class="quiz-content">
        <div class="quiz-progress">
            <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
            <div class="progress-text" id="progressText">01/10</div>
        </div>
        <div class="quiz-chapter" id="quizChapter"></div>
        <div class="quiz-scene" id="quizScene"></div>
        <div class="quiz-question" id="quizQuestion"></div>
        <div class="quiz-options" id="quizOptions"></div>
        <div class="quiz-illustration" id="quizIllust"><canvas id="illustCanvas" width="128" height="40"></canvas></div>
    </div>
</div>

<div class="page" id="page-loading">
    <div class="loading-icon">🔮</div>
    <div class="loading-text">CALCULATING...</div>
    <div class="loading-bar"><div class="loading-bar-fill"></div></div>
</div>

<div class="page" id="page-result">
    <div class="result-portrait" id="resultPortrait">
        <div class="portrait-bg"></div>
        <div class="portrait-particles" id="portraitParticles"></div>
        <div class="portrait-figure" id="portraitFigure"></div>
    </div>
    <div class="result-scroll" id="resultScroll">
        <div class="result-stamp">钦此</div>
        <div class="result-header">RESULT</div>
        <div class="result-decree">皇帝诏曰</div>
        <div class="result-icon" id="resultIcon"></div>
        <div class="result-title" id="resultTitle"></div>
        <div class="result-subtitle" id="resultSubtitle"></div>
        <div class="result-desc" id="resultDesc"></div>
        <div class="result-modern">
            <div class="result-modern-label">JOB TRUTH</div>
            <div class="result-modern-text" id="resultModern"></div>
        </div>
        <div class="result-rare" id="resultRare"></div>
    </div>
    <div class="result-partner" id="resultPartner">
        <div class="result-partner-label">BEST PARTNER</div>
        <div class="result-partner-text" id="resultPartnerText"></div>
    </div>
    <div class="result-actions">
        <button class="btn-share" onclick="showPoster()">生成海报</button>
        <button class="btn-retry" onclick="retry()">再来一次</button>
    </div>
</div>

</div>

<div class="poster-overlay" id="posterOverlay">
    <canvas id="posterCanvas" class="poster-canvas"></canvas>
    <div class="poster-tip">长按保存图片分享</div>
    <button class="btn-close-poster" onclick="closePoster()">关闭</button>
</div>

<script>
const SHARE_URL = 'https://your-domain.com/ancient-career-test.html';

// ── 像素画绘制系统 ──
const P={skin:'#ffcd75',hair:'#5d275d',cloth:'#b13e53',cloth2:'#29366f',gold:'#ffcd75',red:'#b13e53',green:'#38b764',blue:'#41a6f6',dark:'#1a1c2c',gray:'#566c86',white:'#f4f4f4',orange:'#ef7d57',purple:'#5d275d',fire:'#ef7d57',fire2:'#ffcd75',brown:'#73452e',sky:'#73eff7',wood:'#a7724a'};

function drawPerson(c,x,y,hc,cc,dir){c.fillStyle=P.skin;c.fillRect(x,y,3,3);c.fillStyle=hc;c.fillRect(x,y,3,1);c.fillRect(dir==='l'?x+2:x,y,1,2);c.fillStyle=cc;c.fillRect(x,y+3,3,3);c.fillRect(x-1,y+3,1,2);c.fillRect(x+3,y+3,1,2);c.fillStyle=P.dark;c.fillRect(x,y+6,1,2);c.fillRect(x+2,y+6,1,2);}
function drawBldg(c,x,y,w,h,rc,wc){c.fillStyle=rc;for(let i=0;i<3;i++)c.fillRect(x-1+i,y-2+i,w+2-i*2,1);c.fillStyle=wc;c.fillRect(x,y+1,w,h);c.fillStyle=P.dark;c.fillRect(x+Math.floor(w/2)-1,y+h-3,2,3);}
function drawFl(c,x,y){c.fillStyle=P.fire;c.fillRect(x,y+1,3,2);c.fillStyle=P.fire2;c.fillRect(x+1,y,1,1);}
function drawTr(c,x,y,cl){c.fillStyle=cl||P.green;c.fillRect(x,y,5,1);c.fillRect(x+1,y-1,3,1);c.fillRect(x+2,y-2,1,1);c.fillStyle=P.brown;c.fillRect(x+2,y+1,1,3);}
function drawMn(c,x,y){c.fillStyle=P.gold;c.fillRect(x,y,4,4);c.fillStyle=P.dark;c.fillRect(x,y,2,2);}
function drawSw(c,x,y){c.fillStyle=P.gray;c.fillRect(x,y,1,5);c.fillStyle=P.brown;c.fillRect(x-1,y+5,3,1);}
function drawSc(c,x,y){c.fillStyle=P.gold;c.fillRect(x,y,5,4);c.fillStyle=P.dark;c.fillRect(x+1,y+1,3,2);}
function drawCr(c,x,y){c.fillStyle=P.gold;c.fillRect(x,y+1,5,2);c.fillRect(x,y,1,1);c.fillRect(x+2,y,1,1);c.fillRect(x+4,y,1,1);}
function drawHr(c,x,y){c.fillStyle=P.brown;c.fillRect(x,y+1,5,3);c.fillRect(x+5,y,2,2);c.fillStyle=P.dark;c.fillRect(x,y+4,1,2);c.fillRect(x+3,y+4,1,2);}
function drawFg(c,x,y,cl){c.fillStyle=P.brown;c.fillRect(x,y,1,7);c.fillStyle=cl||P.red;c.fillRect(x+1,y,4,3);}

let currentQuestion = 'q1';
let questionCount = 0;
let answerHistory = [];

function getBranch() {
    if (!answerHistory.length) return 'default';
    const firstNext = answerHistory[0].option.next;
    if (firstNext === 'q2a') return 'palace';
    if (firstNext === 'q2b') return 'market';
    if (firstNext === 'q2c') return 'scholar';
    if (firstNext === 'q2d') return 'jianghu';
    return 'default';
}
function getMainLine() {
    for (let i = answerHistory.length - 1; i >= 0; i--) {
        const next = answerHistory[i].option.next;
        if (next === 'q6a' || next === 'q6b') return 'temple';
        if (next === 'q6c' || next === 'q6d') return 'jianghu';
    }
    return 'temple';
}

function showPage(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    const page = document.getElementById(id);
    page.classList.add('active');
}

function startQuiz() { currentQuestion = 'q1'; questionCount = 0; answerHistory = []; showPage('page-quiz'); renderQuestion(); }

function renderQuestion() {
    const q = QUESTIONS[currentQuestion];
    const bg = document.getElementById('sceneBg');
    bg.classList.remove('showing'); bg.classList.add('fading');
    setTimeout(() => { bg.className = 'scene-bg fading ' + (q.bg||'bg-wild'); bg.offsetHeight; bg.classList.remove('fading'); bg.classList.add('showing'); }, 200);

    document.getElementById('progressFill').style.width = (questionCount/10*100)+'%';
    document.getElementById('progressText').textContent = String(questionCount+1).padStart(2,'0')+'/10';
    document.getElementById('quizChapter').textContent = q.chapter;
    document.getElementById('quizScene').textContent = q.scene;
    document.getElementById('quizQuestion').textContent = q.question;

    const illustScene = document.getElementById('illustScene');
    renderIllustration(currentQuestion);

    let options = q.options;
    if (q.branchOptions) {
        if (currentQuestion === 'q5') options = q.branchOptions[getBranch()] || q.options;
        else if (currentQuestion === 'q9') options = q.branchOptions[getMainLine()] || q.options;
    }

    const optionsDiv = document.getElementById('quizOptions');
    optionsDiv.innerHTML = '';
    options.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.innerHTML = `<span class="option-label">${opt.label}</span><span>${opt.text}</span>`;
        btn.onclick = () => selectOption(opt, btn);
        optionsDiv.appendChild(btn);
    });
}

function selectOption(opt, btn) {
    document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    answerHistory.push({question:currentQuestion, option:opt});
    questionCount++;
    setTimeout(() => { if (opt.result) showResult(opt.result); else { currentQuestion = opt.next; renderQuestion(); } }, 400);
}

function showResult(resultKey) {
    showPage('page-loading');
    setTimeout(() => {
        const r = RESULTS[resultKey];
        const portrait = document.getElementById('resultPortrait');
        portrait.className = 'result-portrait ' + (r.portraitClass||'');
        document.getElementById('portraitFigure').textContent = r.portrait||r.icon;
        const particles = document.getElementById('portraitParticles');
        const pChars = (r.particles||'✨').split('');
        particles.innerHTML = pChars.map((p,i) => {
            const x = 15+Math.floor(i*70/pChars.length)+Math.floor(i*7%20);
            const y = 20+Math.floor(i*13%60);
            return `<span style="position:absolute;left:${x}%;top:${y}%;font-size:${20+i%3*8}px;animation:blink ${2+i*0.3}s ease ${i*0.5}s infinite;">${p}</span>`;
        }).join('');
        document.getElementById('resultIcon').textContent = r.icon;
        document.getElementById('resultTitle').textContent = r.title;
        document.getElementById('resultSubtitle').textContent = r.subtitle;
        document.getElementById('resultDesc').textContent = r.desc;
        document.getElementById('resultModern').textContent = r.modern;
        document.getElementById('resultRare').textContent = r.rare;
        document.getElementById('resultPartnerText').textContent = r.partner;
        window._currentResult = r;
        showPage('page-result');
    }, 2800);
}

function retry() { showPage('page-start'); }

function showPoster() {
    const r = window._currentResult;
    const canvas = document.getElementById('posterCanvas');
    const ctx = canvas.getContext('2d');
    const W = 600, H = 950;
    canvas.width = W; canvas.height = H;

    ctx.fillStyle = '#262b44'; ctx.fillRect(0,0,W,H);
    ctx.strokeStyle = '#ffcd75'; ctx.lineWidth = 6; ctx.strokeRect(16,16,W-32,H-32);
    ctx.strokeStyle = '#5d275d'; ctx.lineWidth = 3; ctx.strokeRect(24,24,W-48,H-48);

    ctx.textAlign = 'center';
    ctx.fillStyle = '#ffcd75'; ctx.font = 'bold 16px "Press Start 2P", monospace';
    ctx.fillText('ANCIENT CAREER', W/2, 70);
    ctx.fillStyle = '#73eff7'; ctx.font = '12px "Press Start 2P", monospace';
    ctx.fillText('TEST RESULT', W/2, 95);

    ctx.font = '72px serif'; ctx.fillText(r.icon, W/2, 180);
    ctx.fillStyle = '#ffcd75'; ctx.font = 'bold 36px "PingFang SC","Microsoft YaHei"';
    ctx.fillText(r.title, W/2, 240);
    ctx.fillStyle = '#ef7d57'; ctx.font = '16px "PingFang SC"';
    ctx.fillText(r.subtitle, W/2, 272);

    ctx.fillStyle = '#f4f4f4'; ctx.font = '13px "PingFang SC"';
    const lines = wrapText(ctx, r.desc, W-100);
    let y = 310;
    lines.forEach(l => { ctx.fillText(l,W/2,y); y+=22; });

    y += 15;
    ctx.fillStyle = '#29366f'; roundRect(ctx,60,y-16,W-120,44,0); ctx.fill();
    ctx.strokeStyle = '#5d275d'; ctx.lineWidth = 2; roundRect(ctx,60,y-16,W-120,44,0); ctx.stroke();
    ctx.fillStyle = '#38b764'; ctx.font = '10px "Press Start 2P",monospace'; ctx.fillText('JOB TRUTH',W/2,y+2);
    ctx.fillStyle = '#ffcd75'; ctx.font = 'bold 14px "PingFang SC"'; ctx.fillText(r.modern,W/2,y+24);

    y += 55;
    ctx.fillStyle = '#b13e53'; ctx.font = '11px "Press Start 2P",monospace'; ctx.fillText(r.rare, W/2, y);

    // 人物画像
    y += 30;
    ctx.fillStyle = '#1a1c2c'; roundRect(ctx,80,y,W-160,100,0); ctx.fill();
    ctx.strokeStyle = '#5d275d'; ctx.lineWidth = 3; roundRect(ctx,80,y,W-160,100,0); ctx.stroke();
    ctx.font = '56px serif'; ctx.fillText(r.portrait||r.icon, W/2, y+68);
    const pChars = (r.particles||'✨').split('');
    ctx.font = '18px serif'; ctx.globalAlpha = 0.6;
    pChars.forEach((p,i)=>{ ctx.fillText(p, 110+i*130, y+30+(i%2)*40); });
    ctx.globalAlpha = 1;

    // 钦此
    ctx.save(); ctx.translate(W-70,60); ctx.rotate(-0.15);
    ctx.strokeStyle = '#b13e53'; ctx.lineWidth = 3;
    ctx.strokeRect(-22,-22,44,44);
    ctx.fillStyle = '#b13e53'; ctx.font = 'bold 18px "PingFang SC"';
    ctx.fillText('钦此',0,6); ctx.restore();

    document.getElementById('posterOverlay').classList.add('active');
}
function closePoster() { document.getElementById('posterOverlay').classList.remove('active'); }
function wrapText(ctx,text,maxW) { const l=[]; let s=''; for(let i=0;i<text.length;i++){const t=s+text[i];if(ctx.measureText(t).width>maxW){l.push(s);s=text[i];}else s=t;} if(s)l.push(s); return l; }
function roundRect(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
</script>
